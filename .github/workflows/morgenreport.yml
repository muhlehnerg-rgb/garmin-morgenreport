name: Morgenreport

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "30 8 * * *"
    - cron: "0 9 * * *"
    - cron: "30 9 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Nur testen, nichts versenden"
        required: false
        type: boolean
        default: false
      activities_only:
        description: "Nur heutige Aktivitäten für die GPT-Abendabfrage aktualisieren"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  morgenreport:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Prüfen ob heute schon gesendet wurde
        id: check
        run: |
          HEUTE=$(TZ=Europe/Vienna date +%Y-%m-%d)
          STUNDE=$(TZ=Europe/Vienna date +%-H)
          echo "Heute (Wien): $HEUTE, Stunde: $STUNDE"

          # Der Datumsmarker verhindert nur bei den mehrfach geplanten
          # Zeitplan-Läufen einen Doppelversand. Ein workflow_dispatch wurde
          # bewusst manuell ausgelöst und darf deshalb denselben Tagesreport
          # erneut erzeugen, etwa nach einer Programm- oder Datenkorrektur.
          if [ "$github_event_name" = "schedule" ] && [ -f ".last_sent_date.txt" ] && [ "$(cat .last_sent_date.txt)" = "$HEUTE" ]; then
            echo "Heute wurde bereits gesendet. Überspringe."
            echo "SKIP=true" >> "$GITHUB_ENV"
          elif [ "$github_event_name" = "schedule" ] && [ "$STUNDE" -lt 9 ]; then
            echo "Noch zu früh am Morgen. Überspringe."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi
        env:
          github_event_name: ${{ github.event_name }}

      - name: Python einrichten
        if: env.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        if: env.SKIP != 'true'
        run: pip install -r requirements.txt

      - name: Verschluesselten Garmin-Tokenstand suchen
        if: env.SKIP != 'true'
        id: garmin-token-cache
        uses: actions/cache/restore@v4
        with:
          path: .garmin_tokens.enc
          key: garmin-tokens-${{ github.run_id }}
          restore-keys: |
            garmin-tokens-

      - name: Garmin-Tokens wiederherstellen
        if: env.SKIP != 'true'
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
        run: |
          mkdir -p .garmin_tokens
          if [ -s .garmin_tokens.enc ]; then
            openssl enc -d -aes-256-cbc -pbkdf2 \
              -in .garmin_tokens.enc \
              -out .garmin_tokens/garmin_tokens.json \
              -pass env:GARMIN_TOKENS_B64
            echo "Aktualisierten Tokenstand aus dem verschluesselten Cache geladen."
          else
            printf '%s' "$GARMIN_TOKENS_B64" | base64 -d > .garmin_tokens/garmin_tokens.json
            echo "Tokenstand erstmals aus GARMIN_TOKENS_B64 geladen."
          fi
          test -s .garmin_tokens/garmin_tokens.json

      - name: Morgenreport ausführen
        if: env.SKIP != 'true'
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          ACTIVITIES_ONLY: ${{ inputs.activities_only }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADRESSE: ${{ secrets.GMAIL_ADRESSE }}
          GMAIL_APP_PASSWORT: ${{ secrets.GMAIL_APP_PASSWORT }}
          MORGENREPORT_EMPFAENGER: ${{ secrets.MORGENREPORT_EMPFAENGER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRACKER_SECRET: ${{ secrets.TRACKER_SECRET }}
        run: |
          if [ "$ACTIVITIES_ONLY" = "true" ] && [ "$DRY_RUN" = "true" ]; then
            python morgenreport.py --heutige-aktivitaeten --dry-run
          elif [ "$ACTIVITIES_ONLY" = "true" ]; then
            python morgenreport.py --heutige-aktivitaeten
          elif [ "$DRY_RUN" = "true" ]; then
            python morgenreport.py --dry-run
          else
            python morgenreport.py
          fi

      - name: Aktualisierte Garmin-Tokens verschluesseln
        if: env.SKIP != 'true' && success()
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
        run: |
          test -s .garmin_tokens/garmin_tokens.json
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in .garmin_tokens/garmin_tokens.json \
            -out .garmin_tokens.enc \
            -pass env:GARMIN_TOKENS_B64

      - name: Aktualisierten Garmin-Tokenstand speichern
        if: env.SKIP != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .garmin_tokens.enc
          key: garmin-tokens-${{ github.run_id }}

      - name: Heutiges Datum als "gesendet" markieren
        # Ein reiner Aktivitätsabruf versendet keinen Morgenreport und darf daher
        # auch nicht den Marker für einen erfolgreichen Tagesversand verändern.
        if: env.SKIP != 'true' && success() && inputs.dry_run != true && inputs.activities_only != true
        run: |
          TZ=Europe/Vienna date +%Y-%m-%d > .last_sent_date.txt
          git config user.name "Morgenreport Bot"
          git config user.email "actions@github.com"
          git add .last_sent_date.txt
          git commit -m "Marker: Report für heute gesendet" || echo "Nichts zu committen"
          git push
