# Dieses Schema wird im Editor des eigenen Fitnesscoach-GPT unter "Actions"
# eingefügt. Es enthält absichtlich keine Secrets. Die Authentifizierung wird
# separat im GPT-Editor als "API key" + "Bearer" konfiguriert.
openapi: 3.1.0
info:
  title: Garmin Morgenreport API
  version: 1.3.0
  description: >-
    Liefert Geralds aktuellsten Garmin-Morgenreport und kann nach ausdrücklicher
    Benutzerbestätigung den fest konfigurierten GitHub-Workflow starten.
servers:
  # Kein abschließender Schrägstrich, da der Pfad unten bereits mit / beginnt.
  - url: https://garmin-morgenreport-gpt.muhlehner-g.workers.dev
paths:
  /morgenreport:
    get:
      # Eindeutiger Name, über den das GPT diese Funktion intern auswählt.
      operationId: getAktuellenMorgenreport
      summary: Aktuellen Morgenreport laden
      description: >-
        Lädt den zuletzt in Firestore gespeicherten Garmin-Morgenreport. Vor jeder
        Tagesanalyse aufrufen. Das zurückgegebene Datum prüfen und deutlich sagen,
        falls der Report nicht von heute ist. Nullwerte bedeuten "nicht verfügbar"
        und dürfen nicht als Messwert 0 interpretiert werden.
      responses:
        "200":
          description: Der aktuelle Morgenreport wurde erfolgreich geladen.
          content:
            application/json:
              schema:
                type: object
                required: [report]
                properties:
                  report:
                    type: object
                    description: Strukturierte Messwerte und vollständiger Berichtstext.
                    # Alte, bereits vor Einführung der GPT Action geschriebene
                    # Dokumente enthalten eventuell noch keinen report_text.
                    required: [datum, score]
                    properties:
                      datum:
                        type: string
                        description: Datum des Reports im Format YYYY-MM-DD.
                      score:
                        type: integer
                        description: Lokal berechneter Erholungsscore von 0 bis 100.
                      empfehlung:
                        type: string
                        description: Grobe, regelbasierte Trainingskategorie.
                      report_text:
                        type: string
                        description: Vollständiger Text wie beim Telegram-Versand.
                      body_battery:
                        type: [integer, "null"]
                      hrv:
                        type: [number, "null"]
                      ruhepuls:
                        type: [number, "null"]
                      schlafdauer_h:
                        type: [number, "null"]
                      schlaf_score:
                        type: [number, "null"]
                      tief_min:
                        type: [number, "null"]
                      rem_min:
                        type: [number, "null"]
                      leicht_min:
                        type: [number, "null"]
                      wach_min:
                        type: [number, "null"]
                      stress_avg:
                        type: [number, "null"]
                      tr_score:
                        type: [number, "null"]
                      tr_level:
                        type: [string, "null"]
                      schritte:
                        type: [integer, "null"]
                      int_min_woche:
                        type: [number, "null"]
                      vo2max:
                        type: [number, "null"]
                      spo2:
                        type: [number, "null"]
                      atemfrequenz:
                        type: [number, "null"]
                      habit_quote:
                        type: [number, "null"]
                        description: Erfüllungsquote der berücksichtigten Gewohnheiten in Prozent.
                      aktivitaeten_gestern:
                        type: array
                        description: >-
                          Alle von Garmin für den Vortag gelieferten Aktivitäten,
                          unabhängig von ihrem Aktivitätstyp. Nicht verfügbare
                          Messwerte bleiben null.
                        items:
                          type: object
                          required: [name, typ]
                          properties:
                            name:
                              type: string
                            typ:
                              type: string
                              description: Garmins technischer Aktivitätstyp.
                            startzeit:
                              type: [string, "null"]
                            dauer_min:
                              type: [number, "null"]
                            distanz_km:
                              type: [number, "null"]
                            kalorien:
                              type: [number, "null"]
                            durchschnittspuls:
                              type: [number, "null"]
                            maximalpuls:
                              type: [number, "null"]
                            hoehenmeter:
                              type: [number, "null"]
                            trainingseffekt_aerob:
                              type: [number, "null"]
                            trainingseffekt_anaerob:
                              type: [number, "null"]
                      aktivitaeten_heute:
                        type: array
                        description: >-
                          Beim letzten Abendabruf gespeicherte Aktivitäten des
                          heutigen Tages. Für Aktualität zusätzlich Datum und
                          Zeitstempel prüfen.
                        items:
                          $ref: "#/components/schemas/Aktivitaet"
                      aktivitaeten_heute_datum:
                        type: [string, "null"]
                      aktivitaeten_heute_aktualisiert_am:
                        type: [string, "null"]
        "401":
          description: API-Schlüssel fehlt oder ist ungültig; keine Daten ausgegeben.
        "404":
          description: Es wurde eine nicht unterstützte Route aufgerufen.
        "500":
          description: Die Worker-Secrets sind nicht vollständig konfiguriert.
        "502":
          description: Der Worker konnte den aktuellen Datensatz nicht aus Firestore laden.
  /morgenreport/start:
    post:
      operationId: startMorgenreport
      summary: Neuen Morgenreport starten
      description: >-
        Startet den festen GitHub-Actions-Workflow auf main und kann Telegram- sowie
        E-Mail-Nachrichten versenden. Nur aufrufen, wenn Gerald den sofortigen Start
        ausdrücklich verlangt oder bestätigt hat. Niemals allein aufgrund einer
        Analysefrage starten.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmed]
              properties:
                confirmed:
                  type: boolean
                  enum: [true]
                  description: >-
                    Muss true sein und bestätigt, dass Gerald den Start ausdrücklich
                    verlangt hat. Ohne diese Bestätigung lehnt der Worker den Start ab.
      responses:
        "202":
          description: Der Morgenreport-Workflow wurde gestartet.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [started]
                  run_id:
                    type: [integer, "null"]
                    description: GitHub-Lauf-ID für die anschließende Statusabfrage.
                  run_url:
                    type: [string, "null"]
                    format: uri
        "400":
          description: JSON ungültig oder ausdrückliche Bestätigung fehlt.
        "401":
          description: API-Schlüssel fehlt oder ist ungültig.
        "500":
          description: Das GitHub-Secret ist im Worker nicht konfiguriert.
        "502":
          description: GitHub konnte den Workflow nicht starten.
  /aktivitaeten/heute:
    get:
      operationId: getHeutigeAktivitaeten
      summary: Zuletzt aktualisierte Aktivitäten von heute laden
      description: >-
        Liefert die separat gespeicherten Garmin-Aktivitäten des heutigen Tages.
        Immer datum und aktualisiert_am nennen. Ein leeres Array bedeutet nur,
        dass beim angegebenen Aktualisierungszeitpunkt keine Aktivität geliefert
        wurde. Wenn Gerald ausdrücklich aktuelle Daten wünscht, zuerst seine
        Bestätigung einholen, startHeutigeAktivitaetenAktualisierung aufrufen,
        den Laufstatus prüfen und danach diese Funktion erneut aufrufen.
      responses:
        "200":
          description: Heutige Aktivitätsdaten aus dem letzten Abendabruf.
          content:
            application/json:
              schema:
                type: object
                required: [datum, aktualisiert_am, aktivitaeten]
                properties:
                  datum:
                    type: [string, "null"]
                    description: Garmin-Tag der Aktivitäten im Format YYYY-MM-DD.
                  aktualisiert_am:
                    type: [string, "null"]
                    description: Zeitpunkt des letzten Abrufs in der Zeitzone Europe/Vienna.
                  aktivitaeten:
                    type: array
                    items:
                      $ref: "#/components/schemas/Aktivitaet"
        "401":
          description: API-Schlüssel fehlt oder ist ungültig.
        "500":
          description: Die Worker-Secrets sind nicht vollständig konfiguriert.
        "502":
          description: Der Worker konnte den Datensatz nicht aus Firestore laden.
  /aktivitaeten/heute/start:
    post:
      operationId: startHeutigeAktivitaetenAktualisierung
      summary: Heutige Garmin-Aktivitäten aktualisieren
      description: >-
        Startet den festen GitHub-Workflow im reinen Aktivitätsmodus. Dieser Lauf
        liest nur die heutigen Garmin-Aktivitäten und aktualisiert Firestore; er
        versendet weder Telegram noch E-Mail. Nur nach ausdrücklicher Bestätigung
        von Gerald aufrufen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmed]
              properties:
                confirmed:
                  type: boolean
                  enum: [true]
      responses:
        "202":
          description: Die Aktualisierung wurde gestartet.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [started]
                  run_id:
                    type: [integer, "null"]
                  run_url:
                    type: [string, "null"]
                    format: uri
        "400":
          description: JSON ungültig oder ausdrückliche Bestätigung fehlt.
        "401":
          description: API-Schlüssel fehlt oder ist ungültig.
        "500":
          description: Das GitHub-Secret ist im Worker nicht konfiguriert.
        "502":
          description: GitHub konnte den Workflow nicht starten.
  /morgenreport/status:
    get:
      operationId: getMorgenreportStatus
      summary: Status eines gestarteten Garmin-Workflows prüfen
      description: >-
        Prüft einen zuvor von einer der beiden Startfunktionen zurückgegebenen
        GitHub-Lauf. Wenn status completed und conclusion success ist, danach die
        zum Start passende Lesefunktion aufrufen: getAktuellenMorgenreport für den
        Morgenreport oder getHeutigeAktivitaeten für die Abendaktualisierung.
      parameters:
        - name: run_id
          in: query
          required: true
          description: Von der verwendeten Startfunktion zurückgegebene numerische GitHub-Lauf-ID.
          schema:
            type: integer
      responses:
        "200":
          description: Aktueller Zustand des Workflow-Laufs.
          content:
            application/json:
              schema:
                type: object
                required: [run_id, status]
                properties:
                  run_id:
                    type: integer
                  status:
                    type: [string, "null"]
                    description: Typischerweise queued, in_progress oder completed.
                  conclusion:
                    type: [string, "null"]
                    description: Bei Abschluss typischerweise success oder failure.
                  run_url:
                    type: [string, "null"]
                    format: uri
                  created_at:
                    type: [string, "null"]
                  updated_at:
                    type: [string, "null"]
        "400":
          description: run_id fehlt oder ist ungültig.
        "401":
          description: API-Schlüssel fehlt oder ist ungültig.
        "500":
          description: Das GitHub-Secret ist im Worker nicht konfiguriert.
        "502":
          description: GitHub konnte den Laufstatus nicht liefern.
components:
  schemas:
    Aktivitaet:
      type: object
      required: [name, typ]
      properties:
        name:
          type: string
        typ:
          type: string
          description: Garmins technischer Aktivitätstyp; es wird kein Typ gefiltert.
        startzeit:
          type: [string, "null"]
        dauer_min:
          type: [number, "null"]
        distanz_km:
          type: [number, "null"]
        kalorien:
          type: [number, "null"]
        durchschnittspuls:
          type: [number, "null"]
        maximalpuls:
          type: [number, "null"]
        hoehenmeter:
          type: [number, "null"]
        trainingseffekt_aerob:
          type: [number, "null"]
        trainingseffekt_anaerob:
          type: [number, "null"]
